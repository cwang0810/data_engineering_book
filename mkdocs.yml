site_name: 大模型数据工程：架构、算法及项目实战
site_url: https://datascale-ai.github.io/data_engineering_book/
site_author: ustc
site_description: 大模型数据工程：架构、算法及项目实战

# 仓库信息 (右上角显示 GitHub 图标)
repo_name: GitHub
repo_url: https://github.com/datascale-ai/data_engineering_book/tree/main

theme:
  name: material
  language: zh
  # 禁用默认的 favicon，可以换成自己的 logo
  # logo: assets/logo.png 
  # favicon: assets/favicon.png
  
  # 关键：书籍模式的特性配置
  features:
    - navigation.sections    # 侧边栏按章节分组
    - navigation.expand      # 默认展开所有目录 (像纸质书目录一样一览无余)
    - navigation.indexes     # 允许点击章节标题页
    - navigation.top         # 返回顶部按钮
    - navigation.footer      # 底部显示 [上一章] [下一章] (书籍核心体验)
    - toc.follow             # 右侧小目录随滚动自动高亮
    - search.suggest         # 搜索建议
    - content.code.copy      # 代码块复制按钮

  # 调色盘：提供护眼模式
  palette:
    # 日间模式 (亮色)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white         # 配合 CSS 将顶栏变白，降低干扰
      accent: red            # 链接高亮色 (类似红笔批注)
      toggle:
        icon: material/weather-sunny
        name: 切换至夜间模式
    
    # 夜间模式 (深色)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: 切换至日间模式

# 插件配置
plugins:
  - search                           # 全文搜索 (内置)
  - glightbox                        # 图片点击放大 (书籍中架构图较多，必备)
  - i18n:
      reconfigure_material: true     # 自动适配 Material 主题
      docs_structure: folder         # 文件夹策略：zh/ 和 en/ 目录
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
          site_name: 大模型数据工程：架构、算法及项目实战
          nav:
            - 目录: index.md
            - 序言: preface.md
            - 第一部分：基础设施与核心理念:
                - 第1章：大模型时代的数据变革（从 Data Ops 到 AI Ops）: part1/1_1_data_change.md
                - 第2章：AI 原生数据栈（向量库、对象存储、Ray/Spark 分布式计算）: part1/1_2_data_infra.md
            - 第二部分：文本预训练数据工程:
                - 第3章：数据获取（CommonCrawl 解析与高并发爬虫）: part2/2_1_data_acquisition.md
                - 第4章：清洗与质量控制（去重、PII 脱敏、防基准污染）: part2/2_2_cleaning_denoising.md
                - 第5章：分词、序列化与高效加载（DataLoader 优化）: part2/2_3_tokenization_serialization.md
            - 第三部分：多模态数据工程:
                - 第6章：图文对数据处理: part3/3_1_image_text_pairs.md
                - 第7章：数据重描述: part3/3_2_recaptioning.md
                - 第8章：视频与音频数据: part3/3_3_video_audio.md
            - 第四部分：指令微调与偏好数据:
                - 第9章：SFT数据设计与指令体系: part4/4_1_SFT.md
                - 第10章：偏好数据与奖励信号: part4/4_2_preference.md
                - 第11章：标注平台、QA体系与数据运营: part4/4_3_qa.md
            - 第五部分：合成数据工程:
                - 第12章：合成数据工厂：从种子到验证: part5/5_1_data_synthesis.md
                - 第13章：知识蒸馏与模型协作: part5/5_2_distillation.md
                - 第14章：合成数据质量控制与模型坍缩: part5/5_3_quality.md
            - 第六部分：推理与 Agent 数据工程:
                - 第15章：思维链与推理数据工程: part6/6_1_COT.md
                - 第16章：Tool-Use 与函数调用数据: part6/6_2_tool.md
                - 第17章：Agent 记忆与多轮交互数据: part6/6_3_agent.md
            - 第九部分：隐私合规与数据安全:
                - 第27章：数据合规框架与治理: part9/Ch27_compliance_framework_and_governance.md
                - 第28章：联邦学习与隐私保护技术: part9/Ch28_federated_learning_and_privacy_preserving_technologies.md
            - 第十部分：项目集（P01-P10）:
                - 项目一：基于 Ray 构建分布式 Mini-C4 数据流水线: part10/10_1_mini_c4.md
                - 项目二：垂直领域专家 SFT（法律）: part10/10_2_legal_sft.md
                - 项目三：LLaVA 多模态指令数据工厂: part10/10_3_llava_instruct.md
                - 项目四：合成数学与代码教材工厂: part10/10_4_synthetic_textbook.md
                - 项目五：多模态 RAG 企业财报助手: part10/10_5_mm_rag.md
                - 项目六：CoT 推理数据集构建与 PRM 训练: part10/10_6_PRM.md
                - 项目七：Agent Tool-Use 数据工厂: part10/10_7_Agent_Tooluse.md
                - 项目八：企业级 DataOps 平台搭建：从数据项目到组织级治理能力: part10/10_8_dataops.md
                - 项目九：隐私保护数据流水线: part10/10_9_privacy_pipline.md
                - 项目十：端到端 LLM 数据飞轮: part10/10_10_flywheel.md
        - locale: en
          name: English
          build: true
          site_name: "Data Engineering for Large Models: Architecture, Algorithms & Projects"
          theme:
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: white
                accent: red
                toggle:
                  icon: material/weather-sunny
                  name: Switch to dark mode
