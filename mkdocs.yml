                scheme: slate
                primary: black
                accent: red
                toggle:
                  icon: material/weather-night
                  name: Switch to light mode
          nav_translations:
            目录: Table of Contents
            序言: Preface
            第一部分：基础设施与核心理念: "Part 1: Infrastructure & Core Concepts"
