      - 第7章：数据重描述: part3/3_2_recaptioning.md
      - 第8章：视频与音频数据: part3/3_3_video_audio.md
  - 第四部分：对齐与合成数据工程:
      - 第9章：指令微调数据: part4/4_1_sft_data.md
      - 第10章：合成数据: part4/4_2_synthetic_data.md
