            第四部分：对齐与合成数据工程: "第4部: アライメントと合成データエンジニアリング"
            第9章：指令微调数据: "第9章: SFTデータ"
            第10章：合成数据: "第10章: 合成データ"
            第11章：人类偏好数据: "第11章: 人間嗜好データ"
            第五部分：应用级数据工程: "第5部: アプリケーション級データエンジニアリング"
