name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      - name: Build documentation
        run: mkdocs build --strict --clean

      - name: Check image budget
        run: python scripts/check_image_sizes.py

      - name: Check Chinese style terms
        run: python scripts/check_style_terms.py --baseline scripts/style_terms_baseline.json

  project-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project smoke dependencies
        run: pip install -r requirements-project-smoke.txt

      - name: Run quick project smoke tests
        run: python scripts/run_all_project_smoke_tests.py

      - name: Run full project smoke tests
        run: python scripts/run_all_project_smoke_tests.py --full --clean
