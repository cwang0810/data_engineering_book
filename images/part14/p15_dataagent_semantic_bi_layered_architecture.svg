<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">DataAgent 企业语义问数助手分层架构</title>
  <desc id="desc">从用户入口、接口层、主 Agent 层、语义与查询层、执行与资产层到治理与复盘层的分层架构图。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { fill: #172033; font: 700 42px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .subtitle { fill: #5c667a; font: 400 22px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .layer-title { fill: #172033; font: 700 26px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .layer-desc { fill: #384256; font: 400 20px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .chip-text { fill: #22304a; font: 500 18px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .side-label { fill: #ffffff; font: 700 20px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 1px; }
      .note { fill: #5c667a; font: 400 18px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .arrow { stroke: #516075; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .thin { stroke: #d8dde8; stroke-width: 1.5; fill: none; }
      .chip { fill: #ffffff; stroke: #d8dde8; stroke-width: 1.4; }
      .layer { stroke-width: 2; }
      .num { fill: #ffffff; font: 700 20px "Noto Sans CJK SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#516075"/>
    </marker>
    <filter id="shadow" x="-5%" y="-8%" width="110%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>

  <text class="title" x="800" y="82" text-anchor="middle">DataAgent 企业语义问数助手分层架构</text>
  <text class="subtitle" x="800" y="120" text-anchor="middle">自然语言问题进入 Agent 编排链路，经过语义层增强、NL2SQL 查询与结果资产化，最终形成可审计交付</text>

  <rect x="72" y="180" width="94" height="792" rx="8" fill="#25314a"/>
  <text class="side-label" x="119" y="320" text-anchor="middle" transform="rotate(-90 119 320)">输入与编排</text>
  <line x1="119" y1="404" x2="119" y2="512" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2"/>
  <text class="side-label" x="119" y="635" text-anchor="middle" transform="rotate(-90 119 635)">查询与执行</text>
  <line x1="119" y1="704" x2="119" y2="812" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2"/>
  <text class="side-label" x="119" y="900" text-anchor="middle" transform="rotate(-90 119 900)">交付与治理</text>

  <g filter="url(#shadow)">
    <rect class="layer" x="215" y="170" width="1280" height="118" rx="8" fill="#ffffff" stroke="#cfd6e6"/>
    <circle cx="272" cy="229" r="24" fill="#3a6ea5"/>
    <text class="num" x="272" y="236" text-anchor="middle">1</text>
    <text class="layer-title" x="315" y="218">用户 / 外部系统</text>
    <text class="layer-desc" x="315" y="252">业务人员、数据产品、外部 Agent 或内部系统发起自然语言问数请求</text>
    <rect class="chip" x="1022" y="205" width="116" height="42" rx="6"/>
    <text class="chip-text" x="1080" y="232" text-anchor="middle">业务问题</text>
    <rect class="chip" x="1152" y="205" width="116" height="42" rx="6"/>
    <text class="chip-text" x="1210" y="232" text-anchor="middle">分析任务</text>
    <rect class="chip" x="1282" y="205" width="128" height="42" rx="6"/>
    <text class="chip-text" x="1346" y="232" text-anchor="middle">系统调用</text>

    <rect class="layer" x="215" y="320" width="1280" height="118" rx="8" fill="#f1f7ff" stroke="#b8cce8"/>
    <circle cx="272" cy="379" r="24" fill="#2f7ebc"/>
    <text class="num" x="272" y="386" text-anchor="middle">2</text>
    <text class="layer-title" x="315" y="368">接口层</text>
    <text class="layer-desc" x="315" y="402">统一承接本地调试、应用集成和服务化调用，屏蔽底层 Agent 运行细节</text>
    <rect class="chip" x="979" y="355" width="92" height="42" rx="6"/>
    <text class="chip-text" x="1025" y="382" text-anchor="middle">CLI</text>
    <rect class="chip" x="1085" y="355" width="146" height="42" rx="6"/>
    <text class="chip-text" x="1158" y="382" text-anchor="middle">Python SDK</text>
    <rect class="chip" x="1245" y="355" width="168" height="42" rx="6"/>
    <text class="chip-text" x="1329" y="382" text-anchor="middle">A2A Server</text>

    <rect class="layer" x="215" y="470" width="1280" height="118" rx="8" fill="#f3fbf7" stroke="#b8dbc9"/>
    <circle cx="272" cy="529" r="24" fill="#2c8a68"/>
    <text class="num" x="272" y="536" text-anchor="middle">3</text>
    <text class="layer-title" x="315" y="518">主 Agent 层</text>
    <text class="layer-desc" x="315" y="544">理解用户目标，拆分任务，判断是否查库</text>
    <text class="layer-desc" x="315" y="572">并组织工具调用与最终回答</text>
    <rect class="chip" x="918" y="505" width="128" height="42" rx="6"/>
    <text class="chip-text" x="982" y="532" text-anchor="middle">FlexAgent</text>
    <rect class="chip" x="1060" y="505" width="112" height="42" rx="6"/>
    <text class="chip-text" x="1116" y="532" text-anchor="middle">ReAct</text>
    <rect class="chip" x="1186" y="505" width="164" height="42" rx="6"/>
    <text class="chip-text" x="1268" y="532" text-anchor="middle">场景提示词</text>
    <rect class="chip" x="1364" y="505" width="96" height="42" rx="6"/>
    <text class="chip-text" x="1412" y="532" text-anchor="middle">工具选择</text>

    <rect class="layer" x="215" y="620" width="1280" height="118" rx="8" fill="#fff8ec" stroke="#e6cf9d"/>
    <circle cx="272" cy="679" r="24" fill="#b7791f"/>
    <text class="num" x="272" y="686" text-anchor="middle">4</text>
    <text class="layer-title" x="315" y="668">语义与查询层</text>
    <text class="layer-desc" x="315" y="694">用语义层召回 schema 与业务口径</text>
    <text class="layer-desc" x="315" y="722">再由 NL2SQL 子 Agent 生成、校验并执行 SQL</text>
    <rect class="chip" x="892" y="655" width="132" height="42" rx="6"/>
    <text class="chip-text" x="958" y="682" text-anchor="middle">MetaVisor</text>
    <rect class="chip" x="1038" y="655" width="150" height="42" rx="6"/>
    <text class="chip-text" x="1113" y="682" text-anchor="middle">GaussVector</text>
    <rect class="chip" x="1202" y="655" width="198" height="42" rx="6"/>
    <text class="chip-text" x="1301" y="682" text-anchor="middle">NL2SQL 子 Agent</text>

    <rect class="layer" x="215" y="770" width="1280" height="118" rx="8" fill="#fdf2f5" stroke="#e4b8c7"/>
    <circle cx="272" cy="829" r="24" fill="#b23b61"/>
    <text class="num" x="272" y="836" text-anchor="middle">5</text>
    <text class="layer-title" x="315" y="818">执行与资产层</text>
    <text class="layer-desc" x="315" y="844">将查询执行结果转成可复核资产</text>
    <text class="layer-desc" x="315" y="872">供业务回答、报告生成和后续审计使用</text>
    <rect class="chip" x="838" y="805" width="138" height="42" rx="6"/>
    <text class="chip-text" x="907" y="832" text-anchor="middle">数据库执行</text>
    <rect class="chip" x="990" y="805" width="106" height="42" rx="6"/>
    <text class="chip-text" x="1043" y="832" text-anchor="middle">SQL 文件</text>
    <rect class="chip" x="1110" y="805" width="106" height="42" rx="6"/>
    <text class="chip-text" x="1163" y="832" text-anchor="middle">CSV 文件</text>
    <rect class="chip" x="1230" y="805" width="106" height="42" rx="6"/>
    <text class="chip-text" x="1283" y="832" text-anchor="middle">报告文件</text>
    <rect class="chip" x="1350" y="805" width="112" height="42" rx="6"/>
    <text class="chip-text" x="1406" y="832" text-anchor="middle">workspace</text>

    <rect class="layer" x="215" y="920" width="1280" height="118" rx="8" fill="#f5f3ff" stroke="#c8c0ea"/>
    <circle cx="272" cy="979" r="24" fill="#6454a8"/>
    <text class="num" x="272" y="986" text-anchor="middle">6</text>
    <text class="layer-title" x="315" y="968">治理与复盘层</text>
    <text class="layer-desc" x="315" y="994">沉淀运行轨迹、工具调用状态和配置版本</text>
    <text class="layer-desc" x="315" y="1022">让结果可追踪、失败可定位、质量可回归</text>
    <rect class="chip" x="870" y="955" width="136" height="42" rx="6"/>
    <text class="chip-text" x="938" y="982" text-anchor="middle">运行轨迹</text>
    <rect class="chip" x="1020" y="955" width="168" height="42" rx="6"/>
    <text class="chip-text" x="1104" y="982" text-anchor="middle">工具调用状态</text>
    <rect class="chip" x="1202" y="955" width="136" height="42" rx="6"/>
    <text class="chip-text" x="1270" y="982" text-anchor="middle">配置版本</text>
    <rect class="chip" x="1352" y="955" width="136" height="42" rx="6"/>
    <text class="chip-text" x="1420" y="982" text-anchor="middle">测试验收</text>
  </g>

  <path class="arrow" d="M800 288 L800 318"/>
  <path class="arrow" d="M800 438 L800 468"/>
  <path class="arrow" d="M800 588 L800 618"/>
  <path class="arrow" d="M800 738 L800 768"/>
  <path class="arrow" d="M800 888 L800 918"/>

  <path class="thin" d="M1510 229 C1544 229 1544 379 1510 379"/>
  <path class="thin" d="M1510 529 C1544 529 1544 829 1510 829"/>
  <path class="thin" d="M1510 979 C1544 979 1544 1038 1510 1038"/>
  <text class="note" x="1532" y="322" text-anchor="middle" transform="rotate(90 1532 322)">入口</text>
  <text class="note" x="1532" y="682" text-anchor="middle" transform="rotate(90 1532 682)">生成可信结果</text>
  <text class="note" x="1532" y="1010" text-anchor="middle" transform="rotate(90 1532 1010)">持续改进</text>
</svg>
