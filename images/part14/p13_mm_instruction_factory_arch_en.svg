<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 730" width="1000" height="730">
    <defs>
        <!-- Background Grid -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5EAF0" stroke-width="1" />
        </pattern>

        <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A2B3C" />
        </marker>

        <!-- C1 Icons -->
        <g id="icon-seed">
            <circle cx="-8" cy="0" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="-4" y1="4" x2="0" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 6 -4 L 14 -4 A 1 1 0 0 1 15 -3 L 15 6 A 1 1 0 0 1 14 7 L 6 7 A 1 1 0 0 1 5 6 L 5 -3 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M 6 -4 L 6 -6 A 1 1 0 0 1 7 -7 L 10 -7 A 1 1 0 0 1 11 -6 L 11 -4" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </g>

        <!-- C2 Icons -->
        <g id="icon-generator">
            <!-- Brain -->
            <path d="M -12 -4 C -16 -4, -18 0, -16 4 C -18 8, -14 12, -10 12 C -8 15, -2 15, 0 12 C 4 12, 6 8, 4 4 C 6 0, 2 -4, -2 -4 C -4 -6, -10 -6, -12 -4 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M -8 2 C -6 4, -4 0, -2 2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <!-- Speech Bubble -->
            <rect x="8" y="-6" width="10" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 12 2 L 12 6 L 16 2" fill="currentColor"/>
        </g>

        <!-- C3 Icons -->
        <g id="icon-quality">
            <!-- Clipboard -->
            <rect x="-15" y="-8" width="12" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <line x1="-11" y1="-2" x2="-5" y2="-2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="-11" y1="2" x2="-5" y2="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="-11" y1="6" x2="-7" y2="6" stroke="currentColor" stroke-width="1.5"/>
            <line x1="-11" y1="-8" x2="-7" y2="-8" stroke="currentColor" stroke-width="1.5"/>
            <!-- Thumbs Up -->
            <path d="M 3 6 L 3 0 L 7 -4 L 9 -4 L 9 0 L 13 0 L 15 6 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="3" y1="0" x2="-1" y2="0" stroke="currentColor" stroke-width="1.5"/>
        </g>

        <!-- C4 Icons -->
        <g id="icon-judge">
            <!-- Scales -->
            <line x1="-8" y1="-8" x2="-8" y2="10" stroke="currentColor" stroke-width="2"/>
            <path d="M -12 10 L -4 10" stroke="currentColor" stroke-width="2"/>
            <line x1="-18" y1="-8" x2="2" y2="-8" stroke="currentColor" stroke-width="2"/>
            <path d="M -18 -8 L -22 2 L -14 2 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 2 -8 L -2 2 L 6 2 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <!-- Gavel -->
            <rect x="12" y="-2" width="8" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(-45 16 0)"/>
            <line x1="16" y1="0" x2="22" y2="8" stroke="currentColor" stroke-width="2"/>
        </g>

        <!-- C5 Icons -->
        <g id="icon-packer">
            <polygon points="0,-10 -10,-4 0,2 10,-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <polygon points="-10,-4 -10,6 0,12 0,2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <polygon points="10,-4 10,6 0,12 0,2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="0" y1="-10" x2="0" y2="-4" stroke="currentColor" stroke-width="1.5"/>
        </g>
        
        <!-- C5 Icon Delivery -->
        <g id="icon-delivery">
            <path d="M -6 6 L -6 -4 L 8 -4 L 8 6 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 8 0 L 14 0 L 16 6 L 8 6 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="0" cy="8" r="3" fill="currentColor"/>
            <circle cx="12" cy="8" r="3" fill="currentColor"/>
            <line x1="-12" y1="-2" x2="-8" y2="-2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="-16" y1="2" x2="-10" y2="2" stroke="currentColor" stroke-width="1.5"/>
        </g>

        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.1" />
        </filter>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#F8FAFC" />
    <rect x="0" y="0" width="100%" height="100%" fill="url(#grid)" />

    <text x="500" y="60" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1A2B3C" text-anchor="middle" letter-spacing="1">MULTIMODAL INSTRUCTION FACTORY</text>

    <!-- Big Arrows between Columns -->
    <path d="M 200 130 L 220 130 L 220 120 L 230 140 L 220 160 L 220 150 L 200 150 Z" fill="#2B5C8F" />
    <path d="M 390 130 L 410 130 L 410 120 L 420 140 L 410 160 L 410 150 L 390 150 Z" fill="#1E847F" />
    <path d="M 580 130 L 600 130 L 600 120 L 610 140 L 600 160 L 600 150 L 580 150 Z" fill="#D68910" />
    <path d="M 770 130 L 790 130 L 790 120 L 800 140 L 790 160 L 790 150 L 770 150 Z" fill="#8E44AD" />

    <!-- Column 1: SEED SELECTOR -->
    <rect x="40" y="100" width="160" height="580" rx="12" fill="#EAF2F8" stroke="#2B5C8F" stroke-width="4" filter="url(#shadow)"/>
    <path d="M 42 112 Q 42 102 52 102 L 188 102 Q 198 102 198 112 L 198 180 L 42 180 Z" fill="#2B5C8F" />
    <text x="120" y="140" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SEED</text>
    <text x="120" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SELECTOR</text>

    <use href="#icon-seed" x="120" y="220" transform="scale(2)" transform-origin="120 220" color="#2B5C8F"/>
    <use href="#icon-seed" x="120" y="640" transform="scale(2)" transform-origin="120 640" color="#2B5C8F"/>

    <g font-family="Arial, sans-serif" font-size="16" fill="#1A2B3C">
        <!-- B1 -->
        <circle cx="57" cy="270" r="4" fill="#2B5C8F"/>
        <text x="70" y="275">Gather Raw</text>
        <text x="70" y="297">Multimodal</text>
        <text x="70" y="319">Seeds (Images,</text>
        <text x="70" y="341">Video, Text)</text>
        <!-- B2 -->
        <circle cx="57" cy="400" r="4" fill="#2B5C8F"/>
        <text x="70" y="405">Diversity</text>
        <text x="70" y="427">Filtering &amp;</text>
        <text x="70" y="449">Curation</text>
        <!-- B3 -->
        <circle cx="57" cy="510" r="4" fill="#2B5C8F"/>
        <text x="70" y="515">Metadata</text>
        <text x="70" y="537">Enrichment</text>
    </g>

    <!-- Inter-Column Flow Arrows 1->2 -->
    <g transform="translate(200, 0)">
        <line x1="5" y1="310" x2="25" y2="310" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="420" x2="25" y2="420" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="510" x2="25" y2="510" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
    </g>

    <!-- Column 2: INSTRUCTION GENERATOR -->
    <rect x="230" y="100" width="160" height="580" rx="12" fill="#E9F5F5" stroke="#1E847F" stroke-width="4" filter="url(#shadow)"/>
    <path d="M 232 112 Q 232 102 242 102 L 378 102 Q 388 102 388 112 L 388 180 L 232 180 Z" fill="#1E847F" />
    <text x="310" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">INSTRUCTION</text>
    <text x="310" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">GENERATOR</text>

    <use href="#icon-generator" x="310" y="220" transform="scale(2)" transform-origin="310 220" color="#1E847F"/>
    <use href="#icon-generator" x="310" y="640" transform="scale(2)" transform-origin="310 640" color="#1E847F"/>

    <g font-family="Arial, sans-serif" font-size="16" fill="#0F423F">
        <circle cx="242" cy="270" r="4" fill="#1E847F"/>
        <text x="255" y="275">Design Task</text>
        <text x="255" y="297">Templates</text>
        
        <circle cx="242" cy="350" r="4" fill="#1E847F"/>
        <text x="255" y="355">Contextual</text>
        <text x="255" y="377">Prompting</text>
        <text x="255" y="399">(Image+Text)</text>
        
        <circle cx="242" cy="450" r="4" fill="#1E847F"/>
        <text x="255" y="455">Multimodal</text>
        <text x="255" y="477">Model Synthesis</text>
        <text x="255" y="499">(e.g., LLaVA,</text>
        <text x="255" y="521">GPT-4o)</text>
        
        <circle cx="242" cy="560" r="4" fill="#1E847F"/>
        <text x="255" y="565">Instruction-</text>
        <text x="255" y="587">Response Pair</text>
        <text x="255" y="609">Creation</text>
    </g>

    <!-- Inter-Column Flow Arrows 2->3 -->
    <g transform="translate(390, 0)">
        <line x1="5" y1="310" x2="25" y2="310" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="420" x2="25" y2="420" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="510" x2="25" y2="510" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
    </g>

    <!-- Column 3: QUALITY SCORER -->
    <rect x="420" y="100" width="160" height="580" rx="12" fill="#FEF5E7" stroke="#D68910" stroke-width="4" filter="url(#shadow)"/>
    <path d="M 422 112 Q 422 102 432 102 L 568 102 Q 578 102 578 112 L 578 180 L 422 180 Z" fill="#D68910" />
    <text x="500" y="140" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">QUALITY</text>
    <text x="500" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SCORER</text>

    <use href="#icon-quality" x="500" y="220" transform="scale(2)" transform-origin="500 220" color="#D68910"/>
    <use href="#icon-quality" x="500" y="640" transform="scale(2)" transform-origin="500 640" color="#D68910"/>

    <g font-family="Arial, sans-serif" font-size="16" fill="#6B4408">
        <circle cx="444" cy="270" r="4" fill="#D68910"/>
        <text x="457" y="275">Evaluate</text>
        <text x="457" y="297">Generated</text>
        <text x="457" y="319">Samples</text>
        
        <circle cx="444" cy="360" r="4" fill="#D68910"/>
        <text x="457" y="365">Linguistic</text>
        <text x="457" y="387">Quality &amp;</text>
        
        <circle cx="444" cy="440" r="4" fill="#D68910"/>
        <text x="457" y="445">Visual</text>
        <text x="457" y="467">Grounding</text>
        <text x="457" y="489">Checks</text>
        
        <circle cx="444" cy="540" r="4" fill="#D68910"/>
        <text x="457" y="545">Reject Low-</text>
        <text x="457" y="567">Confidence</text>
        <text x="457" y="589">Pairs</text>
    </g>

    <!-- Inter-Column Flow Arrows 3->4 -->
    <g transform="translate(580, 0)">
        <line x1="5" y1="310" x2="25" y2="310" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="420" x2="25" y2="420" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="510" x2="25" y2="510" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
    </g>

    <!-- Column 4: LLM-AS-JUDGE -->
    <rect x="610" y="100" width="160" height="580" rx="12" fill="#F4ECF7" stroke="#8E44AD" stroke-width="4" filter="url(#shadow)"/>
    <path d="M 612 112 Q 612 102 622 102 L 758 102 Q 768 102 768 112 L 768 180 L 612 180 Z" fill="#8E44AD" />
    <text x="690" y="140" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">LLM-AS-</text>
    <text x="690" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">JUDGE</text>

    <use href="#icon-judge" x="690" y="220" transform="scale(2)" transform-origin="690 220" color="#8E44AD"/>
    <use href="#icon-judge" x="690" y="640" transform="scale(2)" transform-origin="690 640" color="#8E44AD"/>

    <g font-family="Arial, sans-serif" font-size="16" fill="#4A235A">
        <circle cx="629" cy="270" r="4" fill="#8E44AD"/>
        <text x="642" y="275">Final</text>
        <text x="642" y="297">Alignment</text>
        <text x="642" y="319">Review</text>
        
        <circle cx="629" cy="370" r="4" fill="#8E44AD"/>
        <text x="642" y="375">Adherence to</text>
        <text x="642" y="397">Guidelines</text>
        
        <circle cx="629" cy="450" r="4" fill="#8E44AD"/>
        <text x="642" y="455">Safety &amp; Bias</text>
        <text x="642" y="477">Detection</text>
        
        <circle cx="629" cy="530" r="4" fill="#8E44AD"/>
        <text x="642" y="535">Score-Based</text>
        <text x="642" y="557">Filtering &amp;</text>
        <text x="642" y="579">Selection</text>
    </g>

    <!-- Inter-Column Flow Arrows 4->5 -->
    <g transform="translate(770, 0)">
        <line x1="5" y1="310" x2="25" y2="310" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="420" x2="25" y2="420" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="5" y1="510" x2="25" y2="510" stroke="#1A2B3C" stroke-width="2" marker-end="url(#arrow-dark)"/>
    </g>

    <!-- Column 5: EXPANDER & PACKER -->
    <rect x="800" y="100" width="160" height="580" rx="12" fill="#FDEDEC" stroke="#C0392B" stroke-width="4" filter="url(#shadow)"/>
    <path d="M 802 112 Q 802 102 812 102 L 948 102 Q 958 102 958 112 L 958 180 L 802 180 Z" fill="#C0392B" />
    <text x="880" y="140" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">EXPANDER</text>
    <text x="880" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">&amp; PACKER</text>

    <use href="#icon-packer" x="880" y="220" transform="scale(2)" transform-origin="880 220" color="#C0392B"/>
    <use href="#icon-delivery" x="880" y="640" transform="scale(2)" transform-origin="880 640" color="#C0392B"/>

    <g font-family="Arial, sans-serif" font-size="16" fill="#641E16">
        <circle cx="819" cy="270" r="4" fill="#C0392B"/>
        <text x="832" y="275">Re-generate</text>
        <text x="832" y="297">Rejected</text>
        <text x="832" y="319">Content</text>
        
        <circle cx="819" cy="370" r="4" fill="#C0392B"/>
        <text x="832" y="375">Format Data</text>
        <text x="832" y="397">(e.g., JSONL)</text>
        
        <circle cx="819" cy="450" r="4" fill="#C0392B"/>
        <text x="832" y="455">Batching &amp;</text>
        <text x="832" y="477">Compression</text>
        
        <circle cx="819" cy="530" r="4" fill="#C0392B"/>
        <text x="832" y="535">Deliver</text>
        <text x="832" y="557">Training</text>
        <text x="832" y="579">Dataset</text>
    </g>

</svg>
