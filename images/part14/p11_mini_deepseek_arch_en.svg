<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" width="950" height="500">
    <defs>
        <!-- Background Grid -->
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#E5EAF0" stroke-width="1" />
        </pattern>
        
        <!-- Arrow Markers -->
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#5D8EBE" />
        </marker>
        <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#45A1D1" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6EAE5E" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#E08C4A" />
        </marker>
        <marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#B873B6" />
        </marker>
        
        <!-- Small Icon Markers -->
        <marker id="arrow-small" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
        </marker>
        <marker id="arrow-orange-small" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#D68910" />
        </marker>
        <marker id="arrow-green-small" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#229954" />
        </marker>
        
        <!-- Soft Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.1" />
        </filter>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#F8FAFC" />
    <rect x="0" y="0" width="100%" height="100%" fill="url(#grid)" />
    
    <!-- Title -->
    <text x="475" y="80" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#1E2B4D" text-anchor="middle">Mini-DeepSeek Data Pipeline</text>

    <!-- Tags (Input Sources) - ABOVE -->
    <!-- OpenWebMath (Top Left) -->
    <rect x="30" y="145" width="130" height="40" rx="6" fill="#D1ECF9" stroke="#45A1D1" stroke-width="2" />
    <text x="95" y="171" font-family="Arial, sans-serif" font-size="16" fill="#1E2B4D" text-anchor="middle">OpenWebMath</text>
    
    <!-- arXiv (Top Right) -->
    <rect x="180" y="145" width="80" height="40" rx="6" fill="#FCE1CA" stroke="#E08C4A" stroke-width="2" />
    <text x="220" y="171" font-family="Arial, sans-serif" font-size="16" fill="#1E2B4D" text-anchor="middle">arXiv</text>

    <!-- Tags (Input Sources) - BELOW -->
    <!-- FineWeb-Edu (Bottom Left) -->
    <rect x="30" y="415" width="120" height="40" rx="6" fill="#DCE8F5" stroke="#5D8EBE" stroke-width="2" />
    <text x="90" y="441" font-family="Arial, sans-serif" font-size="16" fill="#1E2B4D" text-anchor="middle">FineWeb-Edu</text>
    
    <!-- The Stack v2 (Bottom Right) -->
    <rect x="170" y="415" width="110" height="40" rx="6" fill="#D5EDD0" stroke="#6EAE5E" stroke-width="2" />
    <text x="225" y="441" font-family="Arial, sans-serif" font-size="16" fill="#1E2B4D" text-anchor="middle">The Stack v2</text>

    <!-- Connecting lines from tags to Block 1 -->
    <!-- From Top -->
    <path d="M 95 185 C 95 200, 120 200, 120 215 L 120 220" fill="none" stroke="#45A1D1" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
    <path d="M 220 185 C 220 200, 190 200, 190 215 L 190 220" fill="none" stroke="#E08C4A" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    
    <!-- From Bottom -->
    <path d="M 90 415 C 90 400, 120 400, 120 385 L 120 380" fill="none" stroke="#5D8EBE" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <path d="M 225 415 C 225 400, 190 400, 190 385 L 190 380" fill="none" stroke="#6EAE5E" stroke-width="2.5" marker-end="url(#arrow-green)"/>

    <!-- MAIN BLOCKS -->
    
    <!-- Block 1: Multi-source Sampler -->
    <rect x="80" y="225" width="150" height="150" rx="12" fill="#C9E2FA" stroke="#5D8EBE" stroke-width="2.5" filter="url(#shadow)"/>
    <g font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E2B4D" text-anchor="middle">
        <text x="155" y="290">Multi-source</text>
        <text x="155" y="320">Sampler</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 235 285 L 255 285 L 255 275 L 275 300 L 255 325 L 255 315 L 235 315 Z" fill="#ADC9EA" stroke="#6794CD" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- Block 2: Deduplication -->
    <rect x="280" y="180" width="160" height="240" rx="12" fill="#C1E8CE" stroke="#52A674" stroke-width="2.5" filter="url(#shadow)"/>
    <g font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E2B4D" text-anchor="middle">
        <text x="360" y="235">Cross-source</text>
        <text x="360" y="265">MinHash</text>
        <text x="360" y="295">Deduplication</text>
    </g>
    <!-- Block 2 Icons -->
    <g transform="translate(330, 350)">
        <rect x="0" y="0" width="16" height="22" fill="#D9EAD3" stroke="#229954" stroke-width="1.5"/>
        <rect x="4" y="4" width="16" height="22" fill="#D9EAD3" stroke="#229954" stroke-width="1.5"/>
        <line x1="8" y1="10" x2="16" y2="10" stroke="#229954" stroke-width="1"/>
        <line x1="8" y1="15" x2="16" y2="15" stroke="#229954" stroke-width="1"/>
        <line x1="8" y1="20" x2="12" y2="20" stroke="#229954" stroke-width="1"/>
        <path d="M 24 15 L 35 15" fill="none" stroke="#229954" stroke-width="1.5" marker-end="url(#arrow-green-small)"/>
        <path d="M 40 5 L 58 5 L 52 16 L 52 26 L 46 26 L 46 16 Z" fill="none" stroke="#229954" stroke-width="1.5"/>
    </g>

    <!-- Arrow 2 (Widened Gap) -->
    <path d="M 445 285 L 510 285 L 510 275 L 540 300 L 510 325 L 510 315 L 445 315 Z" fill="#ADD8BE" stroke="#67AB83" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="495" y="340" font-family="Arial, sans-serif" font-size="13" fill="#1E2B4D" text-anchor="middle">De-duplicated</text>
    <text x="495" y="355" font-family="Arial, sans-serif" font-size="13" fill="#1E2B4D" text-anchor="middle">Data</text>

    <!-- Block 3: Tokenizer (Shifted Right) -->
    <rect x="560" y="180" width="120" height="240" rx="12" fill="#FDE1B8" stroke="#D68910" stroke-width="2.5" filter="url(#shadow)"/>
    <g font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E2B4D" text-anchor="middle">
        <text x="620" y="255">Tokenizer</text>
        <text x="620" y="285">Training</text>
        <text x="620" y="315" font-size="14" font-weight="normal">(150K vocab)</text>
    </g>
    <!-- Block 3 Icons -->
    <g transform="translate(592, 350)">
        <rect x="0" y="0" width="18" height="24" fill="#FFF2CC" stroke="#D68910" stroke-width="1.5"/>
        <line x1="4" y1="6" x2="14" y2="6" stroke="#D68910" stroke-width="1.5"/>
        <line x1="4" y1="12" x2="14" y2="12" stroke="#D68910" stroke-width="1.5"/>
        <line x1="4" y1="18" x2="10" y2="18" stroke="#D68910" stroke-width="1.5"/>
        <path d="M 23 12 L 30 12" fill="none" stroke="#D68910" stroke-width="1.5" marker-end="url(#arrow-orange-small)"/>
        <rect x="38" y="0" width="18" height="24" fill="#FFF2CC" stroke="#D68910" stroke-width="1.5"/>
        <text x="47" y="16" font-family="monospace" font-size="10" font-weight="bold" fill="#D68910" text-anchor="middle">{..}</text>
    </g>

    <!-- Arrow 3 (Shifted Right) -->
    <path d="M 685 285 L 705 285 L 705 275 L 725 300 L 705 325 L 705 315 L 685 315 Z" fill="#F7D2A7" stroke="#DCA060" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- Block 4: Pack & Shuffle (Shifted Right) -->
    <rect x="740" y="180" width="100" height="240" rx="12" fill="#E0CBE6" stroke="#8E44AD" stroke-width="2.5" filter="url(#shadow)"/>
    <g font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E2B4D" text-anchor="middle">
        <text x="790" y="255">Pack &amp;</text>
        <text x="790" y="285">Shuffle</text>
    </g>
    <!-- Block 4 Icons -->
    <g transform="translate(767, 350)">
        <rect x="0" y="0" width="12" height="12" rx="1" fill="#A4C2F4" stroke="#6D9EEB" stroke-width="1.5"/>
        <rect x="0" y="16" width="12" height="12" rx="1" fill="#F9CB9C" stroke="#F6B26B" stroke-width="1.5"/>
        <path d="M 16 6 L 22 14 L 16 22" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-small)"/>
        <rect x="32" y="-5" width="12" height="12" rx="1" fill="#EAD1DC" stroke="#C90076" stroke-width="1.5"/>
        <rect x="32" y="10" width="12" height="12" rx="1" fill="#D9EAD3" stroke="#38761D" stroke-width="1.5"/>
        <rect x="32" y="25" width="12" height="12" rx="1" fill="#FFF2CC" stroke="#DFB31F" stroke-width="1.5"/>
    </g>

    <!-- Output Arrows from Block 4 -->
    <line x1="840" y1="250" x2="875" y2="250" stroke="#B873B6" stroke-width="3" marker-end="url(#arrow-pink)"/>
    <line x1="840" y1="300" x2="875" y2="300" stroke="#B873B6" stroke-width="3" marker-end="url(#arrow-pink)"/>
    <line x1="840" y1="350" x2="875" y2="350" stroke="#B873B6" stroke-width="3" marker-end="url(#arrow-pink)"/>

    <!-- Final Output Artifacts -->
    <!-- Output 1: Blue files -->
    <g transform="translate(885, 235)">
        <rect x="0" y="0" width="20" height="26" rx="2" fill="#A8D0F3" stroke="#2D5C8A" stroke-width="1.5"/>
        <rect x="5" y="5" width="20" height="26" rx="2" fill="#8BB5E4" stroke="#2D5C8A" stroke-width="1.5"/>
    </g>

    <!-- Output 2: Database Drum -->
    <g transform="translate(885, 287)">
        <path d="M 0 5 L 0 25 A 12 5 0 0 0 24 25 L 24 5 Z" fill="#D2DCF0" stroke="#48598A" stroke-width="1.5"/>
        <ellipse cx="12" cy="5" rx="12" ry="5" fill="#B8C5E6" stroke="#48598A" stroke-width="1.5"/>
        <ellipse cx="12" cy="15" rx="12" ry="4" fill="none" stroke="#48598A" stroke-width="1" stroke-dasharray="2 2"/>
        <circle cx="12" cy="15" r="1.5" fill="#48598A"/>
        <circle cx="12" cy="22" r="1.5" fill="#48598A"/>
    </g>

    <!-- Output 3: Purple File (Arrow Shards) -->
    <g transform="translate(885, 338)">
        <rect x="0" y="0" width="24" height="30" rx="3" fill="#D7BDE2" stroke="#8E44AD" stroke-width="1.5"/>
        <circle cx="6" cy="15" r="1.5" fill="#8E44AD"/>
        <circle cx="12" cy="15" r="1.5" fill="#8E44AD"/>
        <circle cx="18" cy="15" r="1.5" fill="#8E44AD"/>
        <text x="12" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1E2B4D" text-anchor="middle">.arrow</text>
        <text x="12" y="60" font-family="Arial, sans-serif" font-size="14" fill="#1E2B4D" text-anchor="middle">shards</text>
    </g>

</svg>
